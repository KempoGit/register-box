<div class="reset-wrapper">
  <div class="reset-container glass-panel">
    <div class="login-header">
      <h2>Establecer nueva contraseña</h2>
    </div>

    <form (submit)="$event.preventDefault(); onSubmit()" class="login-form">
      <div class="form-group">
        <label for="reset-password">Nueva Contraseña</label>
        <input
          type="password"
          id="reset-password"
          [formField]="resetForm.password"
          class="glass-input"
          placeholder="••••••••"
        />
        @if (resetForm.password().touched() && resetForm.password().invalid()) {
          @for (error of resetForm.password().errors(); track error) {
            <span class="error-text">{{ error.message }}</span>
          }
        }
      </div>

      <div class="form-group">
        <label for="reset-confirm">Confirmar Contraseña</label>
        <input
          type="password"
          id="reset-confirm"
          [formField]="resetForm.confirmPassword"
          class="glass-input"
          placeholder="••••••••"
        />
      </div>

      @if (errorMessage()) {
        <div class="alert-box" [class.success]="errorMessage()?.includes('exitosamente')">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="glass-button submit-btn" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Guardando...' : 'Cambiar contraseña' }}
      </button>
    </form>
  </div>
</div>
