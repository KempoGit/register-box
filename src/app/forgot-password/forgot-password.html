<div class="forgot-container glass-panel">
  <div class="login-header">
    <h2>Recuperar Contraseña</h2>
    <p>Te enviaremos un enlace temporal</p>
  </div>

  <form (submit)="$event.preventDefault(); onSubmit()" class="login-form">
    <div class="form-group">
      <label for="forgot-email">Correo Electrónico</label>
      <input
        type="email"
        id="forgot-email"
        [formField]="forgotForm.email"
        class="glass-input"
        placeholder="ejemplo@correo.com"
      />
      @if (forgotForm.email().touched() && forgotForm.email().invalid()) {
        @for (error of forgotForm.email().errors(); track error) {
          <span class="error-text">{{ error.message }}</span>
        }
      }
    </div>

    @if (errorMessage()) {
      <div
        class="alert-box"
        [class.success]="
          errorMessage()?.includes('enviado') || errorMessage()?.includes('exitosamente')
        "
      >
        {{ errorMessage() }}
      </div>
    }

    <button type="submit" class="glass-button submit-btn" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Procesando...' : 'Enviar enlace' }}
    </button>
  </form>

  <div class="login-footer">
    <span class="divider"></span>
    <a href="#" (click)="$event.preventDefault(); goToLogin.emit()" class="footer-link"
      >Volver al Ingreso</a
    >
  </div>
</div>
